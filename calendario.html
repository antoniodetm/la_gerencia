    <style>
        body {

        .nav-bar {
            text-align: center;

        }

        .nav-link {
            display: inline-block;
            margin: 0 15px;
            color: #555;
            font-weight: bold;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .nav-link:hover {
            background-color: #f0ede5;
            color: #000;
        }

        .nav-active {
            background-color: #34495e;
            color: white !important;
        }

        .container {
            max-width: 98%;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);

        h2 {

        #calendar {

        }

        /* Asegura que los saltos de línea funcionen en todas las vistas (Mes, Semana y Día) */

        .fc-event-title {
            white-space: pre-wrap !important;
            font-size: 0.9em !important;

        }

        .fc-timegrid-event {
            min-height: fit-content !important;
        }
    </style>
</head>

<body>

    <div class="nav-bar">
        <a href="inicio.html" class="nav-link">🏠 Inicio</a>
        <a href="asignaciones.html" class="nav-link">🔗 Asignaciones</a>
        <a href="clases.html" class="nav-link">📅 Clases</a>
        <a href="alumnos.html" class="nav-link">👤 Alumnos</a>
        <a href="caballos.html" class="nav-link">🐴 Caballos</a>

        <a href="calendario.html" class="nav-link nav-active">🗓️ Calendario</a>
        <a href="control_asistencia.html" class="nav-link">🛂 Control Asistencia</a>
        <a href="bases.html" class="nav-link">🏆 Bases</a>
    </div>

    <div class="container">
        <h2>🗓️ Calendario de Clases Programadas</h2>
        <p style="color: #666; font-size: 0.9em; margin-bottom: 20px;">Visualización de las sesiones proyectadas según
            el número de clases configurado por curso.</p>
        <div id='calendar'></div>
    </div>

    <script src="data-manager.js?v=1.5"></script>
    <script>
        const ordenDias = { "Domingo": 0, "Lunes": 1, "Martes": 2, "Miércoles": 3, "Jueves": 4, "Viernes": 5, "Sábado": 6 };

        document.addEventListener('DOMContentLoaded', async function () {
            let intentos = 0;
            while (!dataManager.initialized && intentos < 20) {
                await new Promise(r => setTimeout(r, 100));
                intentos++;
            }

            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                locale: 'es',
                firstDay: 1,
                slotMinTime: '08:00:00',
                slotMaxTime: '22:00:00',
                allDaySlot: false,
                events: await generarEventos(),
                eventContent: function (arg) {
                    let text = arg.event.title;
                    // Solo añadimos los alumnos si la vista es la de día (Día/Today)
                    if (arg.view.type === 'timeGridDay') {
                        text += '\n' + (arg.event.extendedProps.listaAlumnos || '');
                    }
                    return { domNodes: [document.createTextNode(text)] };
                },
                eventClick: function (info) {
                    if (info.view.type !== 'timeGridDay') {
                        // Si no estamos en la vista de día, cambia a la vista de día para la fecha del evento
                        calendar.changeView('timeGridDay', info.event.start);
                    } else {
                        // Si ya estamos en la vista de día, redirigir a la página de asignaciones
                        const claseId = info.event.extendedProps.claseId;
                        const fecha = info.event.start.toISOString().split('T')[0]; // Formato YYYY-MM-DD
                        window.location.href = `asignaciones.html?claseId=${claseId}&fecha=${fecha}`;
                    }
                }
            });

            calendar.render();

            if (dataManager.useFirebase) {
                dataManager.onSnapshot('clasesEscuela', async () => {
                    calendar.setOption('events', await generarEventos());
                });
                dataManager.onSnapshot('asignacionesEscuela', async () => {
                    calendar.setOption('events', await generarEventos());
                });
                dataManager.onSnapshot('asignacionesEscuela', async () => {
                    calendar.setOption('events', await generarEventos());
                });
            }
        });

        function calcularHoraFin(horaStr, duracionEnMinutos) {
            if (!horaStr) return '12:00';
            const duracion = parseInt(duracionEnMinutos) || 60; // Por defecto 60 minutos si no es un número
            const [hh, mm] = horaStr.split(':').map(Number);

            let minTotales = (hh * 60) + mm + duracion;

            const finH = Math.floor(minTotales / 60) % 24;
            const finM = minTotales % 60;
            return `${String(finH).padStart(2, '0')}:${String(finM).padStart(2, '0')}`;
        }

        async function generarEventos() {
            const clases = await dataManager.get('clasesEscuela') || [];
            const asignaciones = await dataManager.get('asignacionesEscuela') || [];
            const eventos = [];

            clases.forEach(c => {
                // Contar alumnos y generar la lista para la vista de día
                const alumnosAsignados = asignaciones.filter(a => a.claseId == c.id);
                const numAlumnos = alumnosAsignados.length;
                const maxAlumnos = c.maxAlumnos || 'N/A';
                const listaAlumnos = alumnosAsignados.map(a => `• ${a.alumno}`).join('\n');

                if (c.tipo === 'unDia') {
                    const diaNum = ordenDias[c.diaSemana];
                    eventos.push({
                        title: `Clase ${numAlumnos}/${maxAlumnos}`,
                        daysOfWeek: [diaNum],
                        startTime: c.hora,
                        endTime: calcularHoraFin(c.hora, c.duracion),
                        extendedProps: {
                            listaAlumnos: listaAlumnos || '(Sin alumnos asignados)',
                            claseId: c.id
                        },
                        backgroundColor: '#3498db'
                    });
                } else if (c.tipo === 'variosDialas' && c.horarios) {
                    Object.entries(c.horarios).forEach(([dia, hora]) => {
                        const diaNum = ordenDias[dia];
                        eventos.push({
                            title: `Clase ${numAlumnos}/${maxAlumnos}`,
                            daysOfWeek: [diaNum],
                            startTime: hora,
                            endTime: calcularHoraFin(hora, c.duracion),
                            extendedProps: {
                                listaAlumnos: listaAlumnos || '(Sin alumnos asignados)',
                                claseId: c.id
                            },
                            backgroundColor: '#3498db'
                        });
                    });
                }
            });
            return eventos;
        }

    </script>
</body>

</html>
