<html lang="es">

<head>
    <meta charset="UTF-8">

    <!-- FullCalendar CSS -->

    <!-- FullCalendar JS -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <style>

            padding: 15px;

        }

        .nav-link {
            display: inline-block;
            margin: 0 15px;
            color: #555;
            font-weight: bold;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .nav-link:hover {
            background-color: #f0ede5;
            color: #000;
        }

        .nav-active {
            background-color: #34495e;
            color: white !important;
        }

        .container {
            max-width: 98%;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin: 0 auto;
        }

        h2 {
            color: #34495e;
            border-bottom: 2px solid #d4c5b9;
            padding-bottom: 8px;
        }

        #calendar {
            margin-top: 20px;
            min-height: 600px;
        }

        /* Asegura que los saltos de línea funcionen en todas las vistas (Mes, Semana y Día) */
        .fc-event-main,
        .fc-event-title {
            white-space: pre-wrap !important;
            font-size: 0.9em !important;
            line-height: 1.4 !important;
            padding: 5px !important;
        }

        .fc-timegrid-event {
            min-height: fit-content !important;
        }
    </style>
</head>

<body>

    <div class="nav-bar">
        <a href="inicio.html" class="nav-link">🏠 Inicio</a>
        <a href="asignaciones.html" class="nav-link">🔗 Asignaciones</a>
        <a href="clases.html" class="nav-link">📅 Clases</a>
        <a href="alumnos.html" class="nav-link">👤 Alumnos</a>
        <a href="caballos.html" class="nav-link">🐴 Caballos</a>
        <a href="profesores.html" class="nav-link">🎓 Profesores</a>
        <a href="calendario.html" class="nav-link nav-active">🗓️ Calendario</a>
        <a href="control_asistencia.html" class="nav-link">🛂 Control Asistencia</a>
        <a href="bases.html" class="nav-link">🏆 Bases</a>
    </div>

    <div class="container">
        <h2>🗓️ Calendario de Clases Programadas</h2>
        <p style="color: #666; font-size: 0.9em; margin-bottom: 20px;">Visualización de las sesiones proyectadas según
            el número de clases configurado por curso.</p>
        <div id='calendar'></div>
    </div>

    <script src="data-manager.js?v=1.5"></script>
    <script>
        const ordenDias = { "Domingo": 0, "Lunes": 1, "Martes": 2, "Miércoles": 3, "Jueves": 4, "Viernes": 5, "Sábado": 6 };

        document.addEventListener('DOMContentLoaded', async function () {
            let intentos = 0;
            while (!dataManager.initialized && intentos < 20) {
                await new Promise(r => setTimeout(r, 100));
                intentos++;
            }

            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                locale: 'es',
                buttonText: {
                    month: 'Mes',
                    week: 'Semana',
                    day: 'Día'
                },
                firstDay: 1,
                slotMinTime: '08:00:00',
                slotMaxTime: '22:00:00',
                allDaySlot: true, // Muestra la fila de "todo el día"
                views: {
                    timeGridWeek: { allDaySlot: true }, // Asegura que se muestre en la vista de semana
                    timeGridDay: { allDaySlot: true },  // Asegura que se muestre en la vista de día
                    dayGridMonth: { allDaySlot: true }  // Asegura que se muestre en la vista de mes
                },
                events: await generarEventos(),
                eventContent: function (arg) {
                    // Simplificado: solo muestra el título del evento, sin información extra.
                    return { domNodes: [document.createTextNode(arg.event.title)] };
                },
                eventClick: function (info) {
                    if (info.view.type !== 'timeGridDay') {
                        // Si no estamos en la vista de día, cambia a la vista de día para la fecha del evento
                        calendar.changeView('timeGridDay', info.event.start);
                    } else {
                        // Si ya estamos en la vista de día, redirigir a la página de asignaciones
                        const claseId = info.event.extendedProps.claseId;
                        const fecha = info.event.start.toISOString().split('T')[0]; // Formato YYYY-MM-DD
                        if (info.event.extendedProps.tipoEvento === 'clase') window.location.href = `asignaciones.html?claseId=${claseId}&fecha=${fecha}`;
                    }
                }
            });

            calendar.render();

            if (dataManager.useFirebase) {
                dataManager.onSnapshot('clasesEscuela', async () => {
                    calendar.setOption('events', await generarEventos());
                });
                dataManager.onSnapshot('asignacionesEscuela', async () => {
                    calendar.setOption('events', await generarEventos());
                });
                // Listener para campamento que faltaba
                dataManager.onSnapshot('inscripcionesCampamento', async () => {
                    calendar.setOption('events', await generarEventos());
                });
                dataManager.onSnapshot('agendaCaballosEscuela', async () => {
                    calendar.setOption('events', await generarEventos());
                });
                // Asistencia también es necesaria para la agenda de caballos
                dataManager.onSnapshot('attendanceEscuela', async () => { calendar.setOption('events', await generarEventos()); });
            }
        });

        function calcularHoraFin(horaStr, duracionEnMinutos) {
            if (!horaStr) return '12:00';
            const duracion = parseInt(duracionEnMinutos) || 60; // Por defecto 60 minutos si no es un número
            const [hh, mm] = horaStr.split(':').map(Number);

            let minTotales = (hh * 60) + mm + duracion;

            const finH = Math.floor(minTotales / 60) % 24;
            const finM = minTotales % 60;
            return `${String(finH).padStart(2, '0')}:${String(finM).padStart(2, '0')}`;
        }

        // Función para generar un color consistente basado en un string (nombre del alumno/caballo)
        function generarColorPorNombre(nombre) {
            if (!nombre) return '#808080'; // Gris por defecto
            let hash = 0;
            for (let i = 0; i < nombre.length; i++) {
                hash = nombre.charCodeAt(i) + ((hash << 5) - hash);
            }
            // Usamos HSL para generar colores más agradables y evitar los muy claros/oscuros
            const h = hash % 360; // Tono
            const s = 40 + (hash % 30); // Saturación entre 40% y 70%
            const l = 35 + (hash % 10); // Luminosidad entre 35% y 45% (colores oscuros pero visibles)

            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        async function generarEventos() {
            const clases = await dataManager.get('clasesEscuela') || [];
            const asignaciones = await dataManager.get('asignacionesEscuela') || [];
            // Corrección: Usar el dataManager para obtener los datos de forma consistente
            const [inscripcionesCampamento, agendaCaballos, asistencias, caballos] = await Promise.all([
                dataManager.get('inscripcionesCampamento'),
                dataManager.get('agendaCaballosEscuela'),
                dataManager.get('attendanceEscuela'),
                dataManager.get('caballosEscuela')
            ]);

            const hoy = new Date().toISOString().split('T')[0];
            const eventos = [];

            // Agrupar asignaciones por clase y día
            const grupos = {};
            const asignacionesFuturas = (asignaciones || []).filter(a => a.dia >= hoy);

            asignacionesFuturas.forEach(a => {
                const key = `${a.claseId}-${a.dia}`;
                if (!grupos[key]) {
                    const claseInfo = (clases || []).find(c => c.id == a.claseId);
                    if (!claseInfo) return; // Si la clase fue borrada, no la mostramos
                    grupos[key] = { clase: claseInfo, dia: a.dia, alumnos: [] };
                }
                grupos[key].alumnos.push(a.alumno);
            });

            // Crear un evento por cada grupo (clase en un día específico)
            for (const key in grupos) {
                const grupo = grupos[key];
                const numAlumnos = grupo.alumnos.length;
                const maxAlumnos = grupo.clase.maxAlumnos || 'N/A';
                const listaAlumnos = grupo.alumnos.map(nombre => `• ${nombre}`).join('\n');

                eventos.push({
                    title: `Clase ${numAlumnos}/${maxAlumnos}`,
                    start: `${grupo.dia}T${grupo.clase.hora}`,
                    end: `${grupo.dia}T${calcularHoraFin(grupo.clase.hora, grupo.clase.duracion)}`,
                    allDay: false,
                    extendedProps: { listaAlumnos: listaAlumnos || '(Sin alumnos asignados)', claseId: grupo.clase.id, tipoEvento: 'clase' },
                    backgroundColor: '#3498db',
                    borderColor: '#3498db'
                });
            }

            // --- Añadir eventos del CAMPAMENTO ---
            // inscripcionesCampamento es una colección de documentos, no un único documento con 'items'
            (inscripcionesCampamento || []).forEach(data => {
                // --- Eventos de Inicio y Fin de Campamento (solo si no hay viaje programado) ---
                if (data.fechaInicioCampamento && data.semanasCampamento) {
                    const semanas = parseInt(data.semanasCampamento, 10);
                    if (!isNaN(semanas) && semanas > 0) {
                        const fechaInicio = new Date(data.fechaInicioCampamento + 'T12:00:00');
                        const fechaFin = new Date(fechaInicio);
                        fechaFin.setDate(fechaInicio.getDate() + (semanas * 7) - 1);
                        const fechaFinISO = fechaFin.toISOString().split('T')[0];

                        // Solo mostrar INICIO si no hay un viaje de recogida programado para ese día
                        if (!(data.necesitaRecogida === 'Sí' && data.fechaRecogida === data.fechaInicioCampamento)) {
                            eventos.push({
                                title: `🏕️ INICIO Camp: ${data.nombre} ${data.apellido}`,
                                start: data.fechaInicioCampamento,
                                allDay: true,
                                backgroundColor: '#2ecc71',
                                borderColor: '#2ecc71'
                            });
                        }

                        // Solo mostrar FIN si no hay un viaje de salida programado para ese día
                        if (!(data.necesitaRecogida === 'Sí' && data.fechaSalida === fechaFinISO)) {
                            eventos.push({
                                title: `🏁 FIN Camp: ${data.nombre} ${data.apellido}`,
                                start: fechaFinISO,
                                allDay: true,
                                backgroundColor: '#e74c3c',
                                borderColor: '#e74c3c'
                            });
                        }
                    }
                }

                // Evento de Recogida (Entrada)
                if (data.necesitaRecogida === 'Sí' && data.fechaRecogida && data.horaRecogida) {
                    eventos.push({
                        title: `✈️ ${data.horaRecogida} RECOGIDA: ${data.nombre} ${data.apellido}\n📍 ${data.lugarRecogida}`,
                        start: data.fechaRecogida,
                        allDay: true,
                        backgroundColor: '#27ae60',
                        borderColor: '#27ae60'
                    });
                }

                // Evento de Salida
                if (data.necesitaRecogida === 'Sí' && data.fechaSalida && data.horaSalida) {
                    eventos.push({
                        title: `✈️ ${data.horaSalida} SALIDA: ${data.nombre} ${data.apellido}\n📍 ${data.lugarSalida}`,
                        start: data.fechaSalida,
                        allDay: true,
                        backgroundColor: '#c0392b',
                        borderColor: '#c0392b'
                    });
                }
            });

            // --- Añadir eventos de la AGENDA DE CABALLOS ---
            (agendaCaballos || []).forEach(e => {
                const caballo = caballos.find(c => c.id === e.caballoId);
                const nombreCaballo = caballo ? caballo.nombre : 'Caballo desc.';
                const colorCaballo = generarColorPorNombre(nombreCaballo);
                eventos.push({
                    title: `🗓️ ${nombreCaballo}: ${e.tipo}`,
                    start: e.fecha,
                    allDay: true,
                    backgroundColor: colorCaballo,
                    borderColor: colorCaballo,
                    extendedProps: { description: e.descripcion }
                });
            });

            // --- Añadir eventos de TRABAJO de caballos (desde asistencia) ---
            (asistencias || []).filter(e => e.caballo).forEach(e => {
                const colorTrabajo = '#7f8c8d';
                eventos.push({
                    title: `🐴 Trabajo: ${e.caballo}`,
                    start: e.fechaClase,
                    allDay: true,
                    backgroundColor: colorTrabajo,
                    borderColor: colorTrabajo
                });
            });

            return eventos;
        }

    </script>
</body>

</html>
